  <style>
    .fin-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
    .fin-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .fin-kpi-big{padding:22px 20px}
    .fin-kpi-big .kpi-icon{width:52px;height:52px;border-radius:14px;font-size:18px}
    .fin-kpi-big strong{font-size:26px}
    .fin-kpi-big .trend{font-size:12px;color:var(--muted);margin-top:4px;font-weight:700}
    .fin-kpi-big .trend.up{color:#15803d}
    .fin-kpi-big .trend.down{color:var(--red)}
    .badge.parcial{background:#fef3c7;color:#a16207}
    .badge.vencido{background:var(--red-soft);color:var(--red)}
    .fin-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .fin-actions .btn{min-height:36px;padding:0 14px;font-size:13px}
    .fin-section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:32px 0 16px}
    .fin-section-title h2{margin:0;font-size:18px}
    .fin-section-title span{color:var(--muted);font-size:13px;font-weight:700}
    .progress-bar{height:8px;background:#edf2f7;border-radius:99px;overflow:hidden;margin-top:6px}
    .progress-bar i{display:block;height:100%;border-radius:99px}
    .fin-card-highlight{border-left:4px solid var(--primary)}
    .fin-card-highlight.red{border-left-color:var(--red)}
    .fin-card-highlight.yellow{border-left-color:var(--yellow)}
    .fin-card-highlight.green{border-left-color:var(--green)}
    .fin-row-detail{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
    .fin-row-detail div{text-align:center}
    .fin-row-detail div label{display:block;font-size:11px;color:var(--muted);font-weight:800;margin-bottom:2px}
    .fin-row-detail div span{font-size:14px;font-weight:800;color:var(--text)}
    .chart-area{height:220px;position:relative;padding:16px 12px 32px;border-bottom:2px solid var(--line);display:flex;align-items:flex-end;gap:8px}
    .chart-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px}
    .chart-bars{display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center}
    .chart-bar{width:18px;border-radius:4px 4px 0 0;transition:all .3s}
    .chart-bar.entrada{background:var(--green)}
    .chart-bar.saida{background:var(--red);opacity:.7}
    .chart-col label{font-size:10px;color:var(--muted);font-weight:800;margin-top:4px}
    .chart-col .val{font-size:9px;font-weight:800;color:var(--muted);white-space:nowrap}
    .chart-legend{display:flex;gap:20px;justify-content:center;margin-top:12px;font-size:12px;font-weight:800}
    .chart-legend span{display:flex;align-items:center;gap:6px}
    .chart-legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
    .doughnut-wrap{width:130px;height:130px;position:relative;margin:auto;flex-shrink:0}
    .doughnut-wrap svg{transform:rotate(-90deg)}
    .doughnut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
    .doughnut-center strong{font-size:18px;color:var(--text)}
    .doughnut-center span{font-size:10px;color:var(--muted);font-weight:800}
    .legend-grid{display:grid;gap:10px}
    .legend-row{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700}
    .legend-dot{width:10px;height:10px;border-radius:3px}
    .legend-row span{flex:1;color:var(--muted)}
    .legend-row strong{color:var(--text);font-size:14px}
    .comissao-card{background:white;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
    .comissao-card .avatar-mini{width:44px;height:44px;font-size:16px}
    .comissao-card .info{flex:1}
    .comissao-card .info h4{margin:0 0 4px;font-size:15px}
    .comissao-card .info p{margin:0;color:var(--muted);font-size:12px;font-weight:700}
    .comissao-card .valor{text-align:right}
    .comissao-card .valor strong{font-size:18px;color:var(--primary)}
    .comissao-card .valor span{font-size:11px;color:var(--muted);font-weight:800}
    .mini-stat{display:flex;gap:16px;margin-top:8px}
    .mini-stat div{font-size:12px;font-weight:800;color:var(--muted)}
    .mini-stat div strong{color:var(--text);font-size:13px}
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:900}
    .status-pill.ok{background:var(--green-soft);color:#15803d}
    .status-pill.pending{background:var(--yellow-soft);color:#a16207}
    .status-pill.danger{background:var(--red-soft);color:var(--red)}
    .grafico-linha{height:200px;position:relative;padding:20px 8px 30px;border-bottom:2px solid var(--line)}
    .grafico-linha svg{width:100%;height:100%}
    @media(max-width:1100px){.fin-grid-3{grid-template-columns:repeat(2,1fr)}.fin-grid-2{grid-template-columns:1fr}}
    @media(max-width:760px){.fin-grid-3{grid-template-columns:1fr}.fin-grid-2{grid-template-columns:1fr}}
  </style>
</head>

const BRL = v => Number(v || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
const cls = status => {
  const s = String(status || '').toLowerCase();
  if(s.includes('ativo') || s.includes('liberado') || s.includes('entregue') || s.includes('aprov') || s.includes('receb') || s.includes('pago') || s.includes('concluído') || s.includes('liquidada')) return 'ok';
  if(s.includes('faturado') || s.includes('autorizado') || s.includes('em transporte') || s.includes('emitida')) return 'info';
  if(s.includes('cancel') || s.includes('venc') || s.includes('bloque') || s.includes('reprov') || s.includes('atrasado')) return 'danger';
  if(s.includes('parcial') || s.includes('pendente') || s.includes('em aberto') || s.includes('a vencer') || s.includes('a pagar')) return 'pending';
  return 'pending';
};
const badge = s => `<span class="badge ${cls(s)}">${s}</span>`;
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}
function modal(title, body, onConfirm, confirmText='Confirmar'){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalConfirm').textContent = confirmText;
  const m = document.getElementById('modal');
  m.classList.add('open');
  const confirm = document.getElementById('modalConfirm');
  confirm.onclick = () => { if(onConfirm) onConfirm(); m.classList.remove('open'); };
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function pageHead(title, subtitle, actions=''){
  return `<div class="page-head"><div><h1>${title}</h1><p class="subtitle">${subtitle}</p></div><div class="actions">${actions}</div></div>`;
}
function table(headers, rows, empty='Nenhum registro encontrado.'){
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="empty">${empty}</td></tr>`}</tbody></table></div>`;
}
function input(id,label,value='',extra=''){ return `<div class="field ${extra}"><label>${label}</label><input id="${id}" value="${esc(value)}"></div>`; }
function select(id,label,options,value='',extra=''){ return `<div class="field ${extra}"><label>${label}</label><select id="${id}">${options.map(o=>`<option ${o==value?'selected':''}>${o}</option>`).join('')}</select></div>`; }
function getFormData(ids){ const obj={}; ids.forEach(id=>{ const el=document.getElementById(id); obj[id]=el?el.value:''; }); return obj; }
function exportar(nome){ showToast(`Exportação de ${nome} simulada com sucesso`); }

function finBadge(s){
  const sl = String(s||'').toLowerCase();
  if(sl.includes('recebido') || sl.includes('pago') || sl.includes('concluído') || sl.includes('liquidada')) return `<span class="badge ok">${s}</span>`;
  if(sl.includes('parcial')) return `<span class="badge parcial">${s}</span>`;
  if(sl.includes('vencido') || sl.includes('atrasado') || sl.includes('atrasada')) return `<span class="badge vencido">${s}</span>`;
  if(sl.includes('em aberto') || sl.includes('pendente') || sl.includes('a vencer') || sl.includes('a pagar')) return `<span class="badge pending">${s}</span>`;
  if(sl.includes('emitida')) return `<span class="badge info">${s}</span>`;
  return `<span class="badge pending">${s}</span>`;
}

function statusPill(s){
  const sl = String(s||'').toLowerCase();
  if(sl.includes('paga')) return `<span class="status-pill ok"><span style="width:6px;height:6px;border-radius:50%;background:#15803d;display:inline-block"></span> ${s}</span>`;
  if(sl.includes('atrasada')) return `<span class="status-pill danger"><span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block"></span> ${s}</span>`;
  return `<span class="status-pill pending"><span style="width:6px;height:6px;border-radius:50%;background:#a16207;display:inline-block"></span> ${s}</span>`;
}

function financeiro(){
  const fin = state.financeiro;
  const receber = fin.contasReceber;
  const comissoes = fin.comissoesPagar;
  const barter = fin.barter;
  const cpr = fin.cpr;
  const fluxo = fin.fluxoCaixa;

  const totalVendas = receber.reduce((a,b)=>a+b.valorVenda,0);
  const totalRecebido = receber.reduce((a,b)=>a+b.valorRecebido,0);
  const totalReceber = receber.reduce((a,b)=>a+(b.valorVenda-b.valorRecebido),0);
  const totalVencido = receber.filter(r=>r.status==='Vencido').reduce((a,b)=>a+b.valorVenda,0);
  const totalParcial = receber.filter(r=>r.status==='Parcial').reduce((a,b)=>a+(b.valorVenda-b.valorRecebido),0);
  const totalEmAberto = receber.filter(r=>r.status==='Em aberto').reduce((a,b)=>a+b.valorVenda,0);
  const totalComissoes = comissoes.reduce((a,b)=>a+b.valorComissao,0);
  const totalComissoesPagas = comissoes.filter(c=>c.status==='Paga').reduce((a,b)=>a+b.valorComissao,0);
  const totalComissoesPendentes = comissoes.filter(c=>c.status==='A pagar').reduce((a,b)=>a+b.valorComissao,0);
  const totalComissoesAtrasadas = comissoes.filter(c=>c.status==='Atrasada').reduce((a,b)=>a+b.valorComissao,0);
  const totalBarter = barter.reduce((a,b)=>a+b.valorTotal,0);
  const totalCpr = cpr.reduce((a,b)=>a+b.valor,0);
  const saldoCaixa = fluxo[fluxo.length-1].saldo;

  // Linhas da tabela de contas a receber
  const receberRows = receber.map(r=>{
    const pct = r.valorVenda>0 ? Math.round(r.valorRecebido/r.valorVenda*100) : 0;
    return `<tr><td><input type="checkbox"></td><td><b>${r.id}</b></td><td>${r.pedido}</td><td><div class="name-cell"><div class="avatar-mini">${r.cliente[0]}</div>${esc(r.cliente)}</div></td><td>${BRL(r.valorVenda)}</td><td>${BRL(r.valorRecebido)}</td><td><div class="progress-bar"><i style="width:${pct}%;background:${pct>=100?'var(--green)':pct>0?'var(--yellow)':'var(--line-dark)'};transition:width .4s"></i></div><small style="font-size:11px;font-weight:800;color:var(--muted)">${pct}%</small></td><td>${r.dataPrevista}</td><td>${r.dataRecebida||'—'}</td><td>${esc(r.formaPagamento)}</td><td>${finBadge(r.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="receberConta('${r.id}')">Receber</button><button class="link-btn" onclick="verRecibo('${r.id}')">Recibo</button></div></td></tr>`;
  });

  // Linhas da tabela de comissões
  const comissoesRows = comissoes.map(c=>`<tr><td><input type="checkbox"></td><td><b>${c.id}</b></td><td><div class="name-cell"><div class="avatar-mini">${c.representante[0]}</div>${esc(c.representante)}</div></td><td>${c.pedido}</td><td>${esc(c.cliente)}</td><td>${BRL(c.valorVenda)}</td><td>${c.percentual}%</td><td><strong style="color:var(--primary)">${BRL(c.valorComissao)}</strong></td><td>${c.dataVencimento}</td><td>${c.dataPagamento||'—'}</td><td>${statusPill(c.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="pagarComissao('${c.id}')">Pagar</button><button class="link-btn" onclick="verExtratoComissao('${c.id}')">Extrato</button></div></td></tr>`);

  const barterRows = barter.map(b=>`<tr><td><b>${b.id}</b></td><td>${esc(b.cliente)}</td><td>${b.pedido}</td><td>${b.produto}</td><td>${b.quantidade} Sc</td><td>${BRL(b.precoSc)}/Sc</td><td>${BRL(b.valorTotal)}</td><td>${b.entregaPrevista}</td><td>${b.entregaRealizada||'—'}</td><td>${finBadge(b.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="verContratoBarter('${b.id}')">Contrato</button></div></td></tr>`);

  const cprRows = cpr.map(c=>`<tr><td><b>${c.id}</b></td><td>${esc(c.cliente)}</td><td>${BRL(c.valor)}</td><td>${c.taxa}% a.a.</td><td>${c.vencimento}</td><td>${esc(c.banco)}</td><td>${finBadge(c.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="verCpr('${c.id}')">Visualizar</button></div></td></tr>`);

  const fluxoRows = fluxo.map(f=>`<tr><td><b>${f.mes}</b></td><td style="color:#15803d;font-weight:800">${BRL(f.entrada)}</td><td style="color:var(--red);font-weight:800">${BRL(f.saida)}</td><td style="font-weight:800;color:${f.saldo>=0?'#15803d':'var(--red)'}">${BRL(f.saldo)}</td></tr>`);

  // Inadimplência
  const inadimplentes = receber.filter(r=>r.status==='Vencido' || r.status==='Parcial');
  const inadimplentesHtml = inadimplentes.length ? inadimplentes.map(r=>{
    const restante = r.valorVenda - r.valorRecebido;
    return `<div class="card panel fin-card-highlight ${r.status==='Vencido'?'red':'yellow'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div><h3 style="margin:0 0 6px;font-size:16px">${esc(r.cliente)}</h3><p style="margin:0;color:var(--muted);font-size:13px">Pedido ${r.pedido} · ${esc(r.formaPagamento)}</p></div><div style="text-align:right"><strong style="font-size:20px;color:var(--primary)">${BRL(restante)}</strong><div style="font-size:12px;color:var(--muted);font-weight:800;margin-top:2px">${r.status}</div></div></div><div class="fin-row-detail"><div><label>Valor da venda</label><span>${BRL(r.valorVenda)}</span></div><div><label>Recebido</label><span>${BRL(r.valorRecebido)}</span></div><div><label>Vencimento</label><span>${r.dataPrevista}</span></div><div><label>Dias em atraso</label><span style="color:var(--red)">15 dias</span></div></div></div>`;
  }).join('') : '<p style="color:var(--muted);text-align:center;padding:20px">Nenhuma inadimplência registrada.</p>';

  // Gráfico de fluxo de caixa — barras lado a lado limpas
  const maxFluxo = Math.max(...fluxo.map(f=>Math.max(f.entrada, f.saida)));
  const chartHtml = fluxo.map((f,i)=>{
    const hE = Math.max(14, (f.entrada/maxFluxo)*160);
    const hS = Math.max(14, (f.saida/maxFluxo)*160);
    return `<div class="chart-col"><span class="val" style="color:#15803d">${(f.entrada/1000).toFixed(0)}k</span><div class="chart-bars"><div class="chart-bar entrada" style="height:${hE}px"></div><div class="chart-bar saida" style="height:${hS}px"></div></div><label>${f.mes}</label></div>`;
  }).join('');

  // Doughnut de recebimentos
  const pctRecebido = Math.round(totalRecebido/totalVendas*345);
  const pctParcial = Math.round(totalParcial/totalVendas*345);
  const pctVencido = Math.round(totalVencido/totalVendas*345);
  const offsetParcial = -pctRecebido;
  const offsetVencido = -(pctRecebido + pctParcial);

  return pageHead('Financeiro', 'Gestão financeira completa: contas a receber, comissões, barter, CPR, fluxo de caixa e inadimplência.',
    `<button class="btn secondary" onclick="exportar('financeiro')">Exportar Relatório</button><button class="btn primary" onclick="novaReceita()">+ Nova Receita</button>`) +

  // KPIs principais
  `<div class="fin-grid-3">` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon p">R$</div><div><span>Total a Receber</span><strong>${BRL(totalReceber)}</strong><div class="trend ${totalReceber>0?'down':'up'}">${receber.filter(r=>r.status==='Em aberto').length} títulos em aberto</div></div></div>` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon g">✓</div><div><span>Total Recebido</span><strong>${BRL(totalRecebido)}</strong><div class="trend up">${Math.round(totalRecebido/totalVendas*100)}% da carteira</div></div></div>` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon r">!</div><div><span>Inadimplência</span><strong>${BRL(totalVencido + totalParcial)}</strong><div class="trend down">${inadimplentes.length} cliente(s) em atraso</div></div></div>` +
  `</div>` +

  // Segunda linha de KPIs
  `<div class="fin-grid-3">` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon b">⇄</div><div><span>Saldo Caixa</span><strong>${BRL(saldoCaixa)}</strong><div class="trend up">Projeção 6 meses</div></div></div>` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon y">%</div><div><span>Comissões a Pagar</span><strong>${BRL(totalComissoesPendentes + totalComissoesAtrasadas)}</strong><div class="trend ${totalComissoesAtrasadas>0?'down':'up'}">${comissoes.filter(c=>c.status==='Atrasada').length} atrasada(s)</div></div></div>` +
    `<div class="card kpi fin-kpi-big"><div class="kpi-icon p">🌾</div><div><span>Barter / CPR</span><strong>${BRL(totalBarter + totalCpr)}</strong><div class="trend">${barter.length} barter · ${cpr.length} CPR</div></div></div>` +
  `</div>` +

  // Gráficos lado a lado
  `<div class="grid-2">` +
    // Gráfico de fluxo de caixa
    `<div class="card panel"><div class="panel-title"><h2>Fluxo de Caixa</h2><span>Entradas × Saídas (6 meses)</span></div>` +
    `<div class="chart-area">${chartHtml}</div>` +
    `<div class="chart-legend"><span><span class="dot" style="background:var(--green)"></span> Entradas</span><span><span class="dot" style="background:var(--red);opacity:.7"></span> Saídas</span></div>` +
    `</div>` +
    // Doughnut de recebimentos
    `<div class="card panel"><div class="panel-title"><h2>Carteira de Recebimentos</h2><span>Distribuição por status</span></div>` +
    `<div style="display:flex;align-items:center;gap:20px;padding:10px 0">` +
      `<div class="doughnut-wrap">` +
        `<svg viewBox="0 0 140 140" width="130" height="130">` +
          `<circle cx="70" cy="70" r="52" fill="none" stroke="#e2e8f0" stroke-width="16"/>` +
          `<circle cx="70" cy="70" r="52" fill="none" stroke="#22c55e" stroke-width="16" stroke-dasharray="${pctRecebido} ${345-pctRecebido}" stroke-linecap="round"/>` +
          `<circle cx="70" cy="70" r="52" fill="none" stroke="#f59e0b" stroke-width="16" stroke-dasharray="${pctParcial} ${345-pctParcial}" stroke-dashoffset="${offsetParcial}" stroke-linecap="round"/>` +
          `<circle cx="70" cy="70" r="52" fill="none" stroke="#ef4444" stroke-width="16" stroke-dasharray="${pctVencido} ${345-pctVencido}" stroke-dashoffset="${offsetVencido}" stroke-linecap="round"/>` +
        `</svg>` +
        `<div class="doughnut-center"><strong>${BRL(totalVendas)}</strong><span>Carteira</span></div>` +
      `</div>` +
      `<div class="legend-grid" style="flex:1">` +
        `<div class="legend-row"><span class="legend-dot" style="background:var(--green)"></span><span>Recebido</span><strong>${BRL(totalRecebido)}</strong></div>` +
        `<div class="legend-row"><span class="legend-dot" style="background:var(--yellow)"></span><span>Parcial</span><strong>${BRL(totalParcial)}</strong></div>` +
        `<div class="legend-row"><span class="legend-dot" style="background:var(--red)"></span><span>Vencido</span><strong>${BRL(totalVencido)}</strong></div>` +
        `<div class="legend-row"><span class="legend-dot" style="background:var(--line-dark)"></span><span>Em aberto</span><strong>${BRL(totalEmAberto)}</strong></div>` +
      `</div>` +
    `</div></div>` +
  `</div>` +

  // CONTAS A RECEBER
  `<div class="fin-section-title"><h2>📥 Contas a Receber</h2><span>${receber.length} títulos · ${BRL(totalReceber)} em aberto</span></div>` +
  `<div class="fin-actions">` +
    `<button class="btn secondary" onclick="filtrarReceber('todos')">Todos</button>` +
    `<button class="btn secondary" onclick="filtrarReceber('Em aberto')">Em Aberto</button>` +
    `<button class="btn secondary" onclick="filtrarReceber('Parcial')">Parcial</button>` +
    `<button class="btn secondary" onclick="filtrarReceber('Recebido')">Recebido</button>` +
    `<button class="btn secondary" onclick="filtrarReceber('Vencido')">Vencido</button>` +
    `<button class="btn primary" onclick="receberSelecionados()" style="margin-left:auto">Receber Selecionados</button>` +
  `</div>` +
  `<div class="card panel">${table(['','Título','Pedido','Cliente','Valor da Venda','Valor Recebido','Progresso','Data Prevista','Data Recebida','Forma de Pagamento','Status','Ações'], receberRows)}</div>` +

  // COMISSÕES A PAGAR (substituindo Contas a Pagar)
  `<div class="fin-section-title"><h2>% Comissões a Pagar</h2><span>${comissoes.length} títulos · ${BRL(totalComissoesPendentes + totalComissoesAtrasadas)} pendente</span></div>` +
  `<div class="fin-actions">` +
    `<button class="btn secondary" onclick="filtrarComissoes('todos')">Todos</button>` +
    `<button class="btn secondary" onclick="filtrarComissoes('A pagar')">A Pagar</button>` +
    `<button class="btn secondary" onclick="filtrarComissoes('Paga')">Pagas</button>` +
    `<button class="btn secondary" onclick="filtrarComissoes('Atrasada')">Atrasadas</button>` +
    `<button class="btn primary" onclick="pagarComissoesSelecionadas()" style="margin-left:auto">Pagar Selecionadas</button>` +
  `</div>` +
  `<div class="card panel">${table(['','Título','Representante','Pedido','Cliente','Valor Venda','%','Valor Comissão','Vencimento','Pagamento','Status','Ações'], comissoesRows)}</div>` +

  // CPR
  `<div class="fin-section-title"><h2>📜 CPR — Cédula de Produto Rural</h2><span>${cpr.length} títulos · ${BRL(totalCpr)}</span></div>` +
  `<div class="card panel">${table(['CPR','Cliente','Valor','Taxa','Vencimento','Banco','Status','Ações'], cprRows)}</div>` +

  // FLUXO DE CAIXA DETALHADO
  `<div class="fin-section-title"><h2>💰 Fluxo de Caixa Detalhado</h2><span>Últimos 6 meses</span></div>` +
  `<div class="card panel">${table(['Mês','Entradas','Saídas','Saldo'], fluxoRows)}</div>` +

  // INADIMPLÊNCIA
  `<div class="fin-section-title"><h2>⚠️ Inadimplência e Atrasos</h2><span>${inadimplentes.length} cliente(s) com pendência</span></div>` +
  `<div class="grid-2">${inadimplentesHtml}</div>`;
}

function receberConta(id){
  const rec = state.financeiro.contasReceber.find(r=>r.id===id);
  if(!rec) return;
  modal('Receber Conta', `<div class="form-grid">
    ${input('rcliente','Cliente',rec.cliente)}
    ${input('rvalor','Valor da Venda',BRL(rec.valorVenda))}
    ${input('rrecebido','Valor Recebido',BRL(rec.valorRecebido))}
    ${input('rreceber','Valor a Receber',BRL(rec.valorVenda-rec.valorRecebido))}
    ${input('rdataprev','Data Prevista',rec.dataPrevista)}
    ${input('rdatarec','Data Recebida',new Date().toLocaleDateString('pt-BR'))}
    ${select('rforma','Forma de Pagamento',['Barter Soja','Barter Milho','À vista','30/60/90 dias','30/60/90/120 dias','Cartão','Transferência'],rec.formaPagamento)}
    ${select('rstatus','Status',['Em aberto','Parcial','Recebido','Vencido'],rec.status)}
  </div>`,()=>{
    const d = getFormData(['rcliente','rvalor','rrecebido','rreceber','rdataprev','rdatarec','rforma','rstatus']);
    rec.cliente = d.rcliente;
    rec.dataRecebida = d.rdatarec;
    rec.formaPagamento = d.rforma;
    rec.status = d.rstatus;
    render(); showToast(`Conta ${id} atualizada com sucesso`);
  },'Salvar Recebimento');
}

function pagarComissao(id){
  const com = state.financeiro.comissoesPagar.find(c=>c.id===id);
  if(!com) return;
  modal('Pagar Comissão', `<div class="form-grid">
    ${input('crep','Representante',com.representante)}
    ${input('cpedido','Pedido',com.pedido)}
    ${input('ccliente','Cliente',com.cliente)}
    ${input('cvalor','Valor da Venda',BRL(com.valorVenda))}
    ${input('cperc','Percentual',com.percentual+'%')}
    ${input('ccomissao','Valor Comissão',BRL(com.valorComissao))}
    ${input('cvenc','Vencimento',com.dataVencimento)}
    ${input('cpag','Data Pagamento',new Date().toLocaleDateString('pt-BR'))}
    ${select('cstatus','Status',['A pagar','Paga','Atrasada'],com.status)}
  </div>`,()=>{
    const d = getFormData(['crep','cpedido','ccliente','cvalor','cperc','ccomissao','cvenc','cpag','cstatus']);
    com.dataPagamento = d.cpag;
    com.status = d.cstatus;
    render(); showToast(`Comissão ${id} paga com sucesso`);
  },'Confirmar Pagamento');
}

function verCpr(id){ showToast(`CPR ${id} visualizada (simulação)`); }
function novaReceita(){ showToast('Nova receita criada no protótipo'); }
function receberSelecionados(){ showToast('Recebimentos em massa processados'); }
function pagarComissoesSelecionadas(){ showToast('Comissões pagas em massa'); }

function filtrarReceber(filtro){
  const term = filtro==='todos'?'':filtro;
  const tbody = document.querySelector('.table-wrap tbody');
  if(!tbody) return;
  const rows = state.financeiro.contasReceber;
  const filtered = term?rows.filter(r=>r.status===term):rows;
  tbody.innerHTML = filtered.map(r=>{
    const pct = r.valorVenda>0 ? Math.round(r.valorRecebido/r.valorVenda*100) : 0;
    return `<tr><td><input type="checkbox"></td><td><b>${r.id}</b></td><td>${r.pedido}</td><td><div class="name-cell"><div class="avatar-mini">${r.cliente[0]}</div>${esc(r.cliente)}</div></td><td>${BRL(r.valorVenda)}</td><td>${BRL(r.valorRecebido)}</td><td><div class="progress-bar"><i style="width:${pct}%;background:${pct>=100?'var(--green)':pct>0?'var(--yellow)':'var(--line-dark)'};transition:width .4s"></i></div><small style="font-size:11px;font-weight:800;color:var(--muted)">${pct}%</small></td><td>${r.dataPrevista}</td><td>${r.dataRecebida||'—'}</td><td>${esc(r.formaPagamento)}</td><td>${finBadge(r.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="receberConta('${r.id}')">Receber</button><button class="link-btn" onclick="verRecibo('${r.id}')">Recibo</button></div></td></tr>`;
  }).join('');
  if(!filtered.length) tbody.innerHTML = `<tr><td colspan="12" class="empty">Nenhum registro encontrado.</td></tr>`;
}

function filtrarComissoes(filtro){
  const term = filtro==='todos'?'':filtro;
  const tbodies = document.querySelectorAll('.table-wrap tbody');
  const tbody = tbodies[1];
  if(!tbody) return;
  const rows = state.financeiro.comissoesPagar;
  const filtered = term?rows.filter(r=>r.status===term):rows;
  tbody.innerHTML = filtered.map(c=>`<tr><td><input type="checkbox"></td><td><b>${c.id}</b></td><td><div class="name-cell"><div class="avatar-mini">${c.representante[0]}</div>${esc(c.representante)}</div></td><td>${c.pedido}</td><td>${esc(c.cliente)}</td><td>${BRL(c.valorVenda)}</td><td>${c.percentual}%</td><td><strong style="color:var(--primary)">${BRL(c.valorComissao)}</strong></td><td>${c.dataVencimento}</td><td>${c.dataPagamento||'—'}</td><td>${statusPill(c.status)}</td><td><div class="table-actions"><button class="link-btn" onclick="pagarComissao('${c.id}')">Pagar</button><button class="link-btn" onclick="verExtratoComissao('${c.id}')">Extrato</button></div></td></tr>`).join('');
  if(!filtered.length) tbody.innerHTML = `<tr><td colspan="12" class="empty">Nenhum registro encontrado.</td></tr>`;
}

function render(){
  const content = document.getElementById('content');
  content.innerHTML = financeiro();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('openSidebar').onclick = () => {document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('open');};
  document.getElementById('closeSidebar').onclick = () => {document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');};
  document.getElementById('overlay').onclick = () => {document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');};
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  render();
});
