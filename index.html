<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Next Agrolink - Protótipo Funcional</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-text">NEXT <span>agrolink</span></div>
        <button class="icon-btn only-mobile" id="closeSidebar">×</button>
      </div>

      <div class="nav-scroll">
        <p class="nav-title">Principal</p>
        <button class="nav-item active" data-page="dashboard">▣ Dashboard</button>

        <p class="nav-title">Comercial</p>
        <button class="nav-item" data-page="clientes">👤 Clientes</button>
        <button class="nav-item" data-page="representantes">♟ Representantes</button>
        <button class="nav-item" data-page="pedidos">▤ Pedidos</button>
        <button class="nav-item" data-page="vendas">R$ Vendas</button>
        <button class="nav-item" data-page="comissoes">% Comissões</button>

        <p class="nav-title">Produtos</p>
        <button class="nav-item" data-page="produtos">✦ Lista de Produtos</button>
        <button class="nav-item" data-page="cadastroProduto">＋ Cadastro Produto</button>
        <button class="nav-item" data-page="precos">⌑ Categorias e Preços</button>

        <p class="nav-title">Operação</p>
        <button class="nav-item" data-page="estoque">▥ Estoque</button>
        <button class="nav-item" data-page="producao">⚙ Produção</button>
        <button class="nav-item" data-page="qualidade">✓ Qualidade</button>
        <button class="nav-item" data-page="logistica">⇄ Logística</button>

        <p class="nav-title">Gestão</p>
        <button class="nav-item" data-page="financeiro">◈ Financeiro</button>
        <button class="nav-item" data-page="relatorios">▰ Relatórios / BI</button>
        <button class="nav-item" data-page="auditoria">🛡 Auditoria</button>
        <button class="nav-item" data-page="portal">☷ Portal Representante</button>
        <button class="nav-item" data-page="configuracoes">⚙ Configurações</button>
      </div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="btnPerfil">Editar Perfil</button>
        <button class="footer-btn primary" id="btnSair">Sair</button>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="topbar">
        <button class="hamburger" id="openSidebar">☰</button>
        <div>
          <strong id="breadcrumb">Next Agrolink / Dashboard</strong>
          <small>Protótipo funcional HTML/CSS/JS</small>
        </div>
        <input id="globalSearch" class="search" placeholder="Pesquisar no sistema...">
        <div class="user-pill"><span>Bruno Cavalcante</span><b>B</b></div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <nav class="bottom-nav">
    <button data-page="dashboard">▣<span>Início</span></button>
    <button data-page="pedidos">▤<span>Pedidos</span></button>
    <button data-page="clientes">👤<span>Clientes</span></button>
    <button data-page="produtos">✦<span>Produtos</span></button>
    <button data-page="relatorios">▰<span>BI</span></button>
  </nav>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Modal</h2>
        <button class="icon-btn" id="modalClose">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="modalCancel">Cancelar</button>
        <button class="btn primary" id="modalConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
